name: Docs

# Builds the MkDocs-Material site and publishes it to gh-pages via mike,
# which mkdocs.yml's extra.version.provider expects. Two deploy paths:
#
#   - Push to main with docs/** changes  -> deploy "dev" alias (in-progress)
#   - Tag push v*                        -> deploy <version> + update "latest"
#
# All third-party actions are SHA-pinned to audited versions. No
# user-controlled event fields are interpolated into run: steps.
#
# One-time setup required after merging this workflow:
#   Settings -> Pages -> Source: "Deploy from a branch" -> gh-pages, /(root)
# (mike pushes to gh-pages directly; native Pages deploy is no longer used.)

on:
  push:
    # Intentionally no `paths:` filter here. paths: applies to both
    # branch AND tag pushes in GitHub Actions, which would skip tag-push
    # deploys whenever the release commit doesn't happen to touch docs/**.
    # Tag pushes must always deploy a versioned snapshot. Main pushes pay
    # a small "build always" cost, which is fine — the build job is fast.
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # gh-pages writes must serialize. Don't cancel; partial mike runs leave
  # versions.json in a weird state.
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build (validate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        working-directory: docs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site (strict)
        working-directory: docs
        run: mkdocs build --strict

  deploy:
    name: Deploy via mike
    runs-on: ubuntu-latest
    needs: build
    # Skip on PRs (no write access to gh-pages anyway). Run on main pushes
    # and on tag pushes.
    if: github.event_name != 'pull_request'
    permissions:
      contents: write   # mike pushes to gh-pages
    steps:
      - name: Checkout (full history; mike fetches gh-pages too)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        working-directory: docs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git for mike commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike
        working-directory: docs
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            # Strip the leading 'v': v0.2.4 -> 0.2.4. The doc URLs become
            # /lintel/0.2.4/... and /lintel/latest/... (alias).
            version="${REF_NAME#v}"
            mike deploy --push --update-aliases "$version" latest
            mike set-default --push latest
          else
            # main / workflow_dispatch: refresh the in-progress alias.
            mike deploy --push --update-aliases dev
          fi
