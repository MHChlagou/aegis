name: Docs

# Builds the MkDocs-Material site and publishes versioned docs to gh-pages
# via mike (mkdocs.yml's extra.version.provider). Policy:
#
#   - PR touching docs/** or this workflow -> build-only (validation)
#   - Push to main                         -> build-only (validation)
#   - Tag push v*                          -> mike deploy <version> + latest
#
# Intentionally no "dev" / "main" moving aliases: the version dropdown in
# the docs header only ever shows tagged releases, so visitors can't land
# on a stale moving target.
#
# All third-party actions are SHA-pinned. No user-controlled event fields
# are interpolated into run: steps.
#
# One-time GitHub setup (done once; this workflow assumes it is in place):
#   Settings -> Pages -> Source: "Deploy from a branch" -> gh-pages, /(root)

on:
  push:
    # No `paths:` filter here — it applies to both branch AND tag pushes
    # in GitHub Actions, and skipping a tag push whenever the release
    # commit happens to leave docs/** untouched would silently drop the
    # versioned deploy. Main-branch pushes pay a small "build always"
    # cost, which is fine; the build job is fast.
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # gh-pages writes must serialize. Don't cancel; partial mike runs leave
  # versions.json in a weird state.
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build (validate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        working-directory: docs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site (strict)
        working-directory: docs
        run: mkdocs build --strict

  deploy:
    name: Deploy via mike
    runs-on: ubuntu-latest
    needs: build
    # Tag pushes only. Covers both `push` (actual release tag push) and
    # `workflow_dispatch` when the run is dispatched from a tag ref —
    # anything dispatched from a branch keeps ref_type=branch and is
    # skipped, which is the right behaviour for a tag-only deploy.
    if: github.ref_type == 'tag'
    permissions:
      contents: write   # mike pushes to gh-pages
    steps:
      - name: Checkout (full history; mike fetches gh-pages too)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        working-directory: docs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git for mike commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy tagged version
        working-directory: docs
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip the leading 'v': v0.2.5 -> 0.2.5. The doc URLs become
          # /lintel/0.2.5/... and /lintel/latest/... (alias).
          version="${REF_NAME#v}"
          mike deploy --push --update-aliases "$version" latest
          mike set-default --push latest
